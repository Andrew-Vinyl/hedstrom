<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedstrom Client Reports | Vinyl Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/vinyl-theme.css">
    <style>
        body {
            background-color: var(--secondary);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 90%;
            background: rgba(var(--dark-night-rgb), 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(var(--white-rgb), 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 10px rgba(var(--primary-rgb), 0.5));
        }

        h1 {
            color: var(--highlight);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: rgba(var(--white-rgb), 0.7);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .report-card {
            background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.1) 0%, rgba(var(--secondary-rgb), 0.3) 100%);
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            border-radius: 12px;
            padding: 24px;
            text-align: left;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .report-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(var(--highlight-rgb), 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .report-card:hover::before {
            transform: translateX(100%);
        }

        .report-card:hover {
            transform: translateY(-5px);
            border-color: var(--highlight);
            box-shadow: 0 10px 20px rgba(var(--primary-rgb), 0.2);
        }

        .year-tag {
            color: var(--highlight);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .report-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin: 0 0 12px 0;
        }

        .view-btn {
            margin-top: auto;
            align-self: flex-start;
            color: var(--white);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(var(--primary-rgb), 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(var(--primary-rgb), 0.3);
            transition: all 0.2s ease;
        }

        .report-card:hover .view-btn {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.5);
        }

        .view-btn svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s ease;
        }

        .report-card:hover .view-btn svg {
            transform: translateX(4px);
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="/assets/images/VMLogo.png" alt="Vinyl Marketing" class="logo">
        <h1>Hedstrom Reports</h1>
        <p class="subtitle">Access your strategic growth outlooks and insights.</p>

        <div class="report-grid">
            <a href="/reports/2025/q4-report.html" class="report-card">
                <span class="year-tag">2025</span>
                <h3 class="report-title">Q4 Strategic Growth Outlook</h3>
                <span class="view-btn">
                    View Report
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </span>
            </a>

            <!-- Future reports will be added here -->
            <!-- <a href="/reports/2026/q1-report.html" class="report-card"> ... </a> -->
        </div>
    </div>
</body>

</html>
